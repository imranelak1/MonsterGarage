{% extends "base.html" %}

{% block title %}Nouveau client - Monster Garage{% endblock %}

{% block content %}
<section class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <div>
        <p class="text-sm font-semibold text-slate-500">Clients</p>
        <h1 class="mt-1 text-3xl font-black tracking-tight text-slate-950">Nouveau client</h1>
    </div>
    <a class="inline-flex h-10 items-center justify-center rounded-md border border-slate-300 bg-white px-4 text-sm font-bold text-slate-700 transition hover:bg-slate-50" href="{{ url_for('clients.liste') }}">Retour</a>
</section>

<form method="post" class="grid gap-6 rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
    <section>
        <h2 class="text-lg font-black text-slate-950">Informations client</h2>
        <div class="mt-4 grid gap-4 md:grid-cols-3">
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Code client
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="code" value="{{ client.code if client else '' }}" required>
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Type
                <select class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="type">
                    <option value="particulier">Particulier</option>
                    <option value="administration">Administration</option>
                    <option value="sntl">Administration SNTL</option>
                </select>
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Nom
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="nom" value="{{ client.nom if client else '' }}" required>
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Sigle
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="sigle" value="{{ client.sigle if client else '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Téléphone
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="telephone" value="{{ client.telephone if client else '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Téléphone 2
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="telephone_2" value="{{ client.telephone_2 if client else '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Email
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" type="email" name="email" value="{{ client.email if client else '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Ville
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="ville" value="{{ client.ville if client else '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Délai paiement jours
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" type="number" name="delai_paiement_jours" value="{{ client.delai_paiement_jours if client else 30 }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800 md:col-span-3">
                Adresse
                <textarea class="min-h-20 rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="adresse">{{ client.adresse if client else '' }}</textarea>
            </label>
        </div>
    </section>

    <section class="border-t border-slate-200 pt-5">
        <h2 class="text-lg font-black text-slate-950">Mentions fiscales</h2>
        <div class="mt-4 grid gap-4 md:grid-cols-3">
            <label class="grid gap-2 text-sm font-bold text-slate-800">ICE<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="ice" value="{{ client.ice if client else '' }}"></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">IF<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="if_fiscal" value="{{ client.if_fiscal if client else '' }}"></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">RC<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="rc" value="{{ client.rc if client else '' }}"></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800 md:col-span-3">Administration rattachée<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="administration_rattachee" value="{{ client.administration_rattachee if client else '' }}"></label>
        </div>
    </section>

    <section class="border-t border-slate-200 pt-5">
        <h2 class="text-lg font-black text-slate-950">Premier véhicule optionnel</h2>
        <div class="mt-4 grid gap-4 md:grid-cols-3">
            <label class="grid gap-2 text-sm font-bold text-slate-800">Immatriculation<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="immatriculation"></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">Marque<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="marque"></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">Modèle<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="modele"></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">Immatriculation type<select class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="type_immatriculation"><option value="standard">Standard</option><option value="administrative">Administrative</option><option value="ww">WW</option><option value="etranger">Étranger</option></select></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">Type véhicule<select class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="type_vehicule"><option value="voiture">Voiture</option><option value="utilitaire">Utilitaire</option><option value="camion">Camion</option><option value="moto">Moto</option><option value="engin">Engin</option><option value="bateau">Bateau</option></select></label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">Kilométrage<input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" type="number" name="kilometrage_actuel"></label>
        </div>
    </section>

    <div class="flex justify-end border-t border-slate-200 pt-5">
        <button class="h-11 rounded-md bg-monster-jaune px-5 text-sm font-black text-black transition hover:bg-yellow-300 focus:outline-none focus:ring-4 focus:ring-yellow-200" type="submit">Enregistrer le client</button>
    </div>
</form>
{% endblock %}
