{% extends "base.html" %}

{% block title %}Paramètres entreprise - Monster Garage{% endblock %}

{% block content %}
<section class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
    <div>
        <p class="text-sm font-semibold text-slate-500">Paramètres</p>
        <h1 class="mt-1 text-3xl font-black tracking-tight text-slate-950">Entreprise</h1>
    </div>
    <a class="inline-flex h-10 items-center justify-center rounded-md border border-slate-300 bg-white px-4 text-sm font-bold text-slate-700 transition hover:bg-slate-50" href="{{ url_for('parametres.systeme') }}">Paramètres système</a>
</section>

<form method="post" class="grid gap-6 rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
    <section>
        <h2 class="text-lg font-black text-slate-950">Identité</h2>
        <div class="mt-4 grid gap-4 md:grid-cols-2">
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Raison sociale
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="raison_sociale" value="{{ entreprise.raison_sociale or '' }}" required>
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Nom commercial
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="nom_commercial" value="{{ entreprise.nom_commercial or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800 md:col-span-2">
                Adresse
                <textarea class="min-h-24 rounded-md border border-slate-300 px-3 py-2 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="adresse" required>{{ entreprise.adresse or '' }}</textarea>
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Ville
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="ville" value="{{ entreprise.ville or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Email
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" type="email" name="email" value="{{ entreprise.email or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800 md:col-span-2">
                Téléphones
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="telephones" value="{{ entreprise.telephones or '' }}">
            </label>
        </div>
    </section>

    <section class="border-t border-slate-200 pt-5">
        <h2 class="text-lg font-black text-slate-950">Mentions fiscales et administratives</h2>
        <div class="mt-4 grid gap-4 md:grid-cols-3">
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                RC
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="rc" value="{{ entreprise.rc or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                IF
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="if_fiscal" value="{{ entreprise.if_fiscal or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                ICE
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="ice" value="{{ entreprise.ice or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Patente
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="patente" value="{{ entreprise.patente or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                CNSS
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="cnss" value="{{ entreprise.cnss or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800">
                Agrément SNTL
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="agrement_sntl" value="{{ entreprise.agrement_sntl or '' }}">
            </label>
            <label class="grid gap-2 text-sm font-bold text-slate-800 md:col-span-3">
                RIB
                <input class="h-11 rounded-md border border-slate-300 px-3 outline-none focus:border-yellow-500 focus:ring-4 focus:ring-yellow-100" name="rib" value="{{ entreprise.rib or '' }}">
            </label>
        </div>
    </section>

    <div class="flex justify-end border-t border-slate-200 pt-5">
        <button class="h-11 rounded-md bg-monster-jaune px-5 text-sm font-black text-black transition hover:bg-yellow-300 focus:outline-none focus:ring-4 focus:ring-yellow-200" type="submit">Enregistrer</button>
    </div>
</form>
{% endblock %}
